services:
  - type: web
    name: p2chat-server
    runtime: python
    rootDir: server
    buildCommand: pip install poetry && poetry install --only main --no-root
    startCommand: poetry run alembic upgrade head && poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: p2chat-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: p2chat-db
    plan: free
    databaseName: p2chat
    user: p2
